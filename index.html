<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>티셔츠 수령 QR 인증</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.10/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      max-width: 500px;
      margin: 0 auto;
      padding: 16px;
      background: #f5f5f5;
    }
    h1 { font-size: 18px; text-align: center; margin: 8px 0 16px; }
    #reader { width: 100%; border-radius: 8px; overflow: hidden; }
    #result {
      margin-top: 16px;
      padding: 24px 16px;
      border-radius: 12px;
      text-align: center;
      font-size: 17px;
      line-height: 1.5;
      display: none;
      white-space: pre-line;
    }
    #result.success { background: #d4edda; color: #155724; border: 2px solid #28a745; }
    #result.warning { background: #fff3cd; color: #856404; border: 2px solid #ffc107; }
    #result.error   { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
    #result.info    { background: #d1ecf1; color: #0c5460; }
    #result .big { font-size: 24px; font-weight: bold; margin: 8px 0; }
    #next-btn {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 10px;
      margin-top: 12px;
      cursor: pointer;
      display: none;
    }
    #next-btn:active { background: #0056b3; }
  </style>
</head>
<body>
  <h1>🏳️‍🌈 티셔츠 수령 QR 인증</h1>
  <div id="reader"></div>
  <div id="result"></div>
  <button id="next-btn" onclick="resumeScanning()">다음 사람 스캔하기</button>

  <script>
    // ====== 설정 ======
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyrd7xrfTjbEq53q7J6Zd8O4vxuVOAOaySUHmp3wrwImr7eEWNsBeJdpb5_JoPZIbQ0/exec';
    const STAFF_TOKEN     = 'qpqr-X9k2mP4nR7vL';  // 앱스 스크립트와 동일하게
    // ==================

    const resultDiv = document.getElementById('result');
    const nextBtn = document.getElementById('next-btn');
    let scanner;
    let isProcessing = false;

    function showResult(html, type) {
      resultDiv.innerHTML = html;
      resultDiv.className = type;
      resultDiv.style.display = 'block';
      nextBtn.style.display = (type === 'info') ? 'none' : 'block';
    }

    async function verifyQR(qrId) {
      if (isProcessing) return;
      isProcessing = true;

      showResult('확인 중...', 'info');

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          // text/plain 사용해서 CORS preflight 회피
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ token: STAFF_TOKEN, qrId: qrId })
        });

        const result = await response.json();

        if (result.status === 'success') {
          showResult(
            `✅ 수령 완료\n<div class="big">${result.name}</div>사이즈: ${result.size}`,
            'success'
          );
          if (navigator.vibrate) navigator.vibrate(200);
        } else if (result.status === 'already_used') {
          showResult(
            `⚠️ 이미 수령됨\n<div class="big">${result.name}</div>사이즈: ${result.size}\n수령시각: ${result.redeemedAt}`,
            'warning'
          );
          if (navigator.vibrate) navigator.vibrate([100, 100, 100]);
        } else if (result.status === 'not_found') {
          showResult(`❌ 등록되지 않은 QR\n다시 확인해주세요`, 'error');
          if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
        } else {
          showResult(`❌ 오류\n${result.message || '알 수 없는 오류'}`, 'error');
        }
      } catch (err) {
        showResult(`❌ 통신 오류\n${err.message}\n인터넷 연결을 확인해주세요`, 'error');
      }
    }

    function resumeScanning() {
      resultDiv.style.display = 'none';
      nextBtn.style.display = 'none';
      isProcessing = false;
    }

    function onScanSuccess(decodedText) {
      verifyQR(decodedText);
    }

    window.addEventListener('load', () => {
      scanner = new Html5QrcodeScanner('reader', {
        fps: 10,
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0,
        rememberLastUsedCamera: true,
        showTorchButtonIfSupported: true
      }, false);
      scanner.render(onScanSuccess);
    });
  </script>
</body>
</html>
